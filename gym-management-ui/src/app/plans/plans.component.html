<div class="container fade-in">
  <div class="header-section">
    <h2 class="page-title">Membership Plans</h2>
    <p class="subtitle">Choose the perfect plan for your fitness goals</p>
  </div>

  <div class="dashboard-grid" style="grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));">
    <div *ngFor="let plan of plans" class="glass-panel" style="text-align: center; display: flex; flex-direction: column; gap: 1rem; position: relative; overflow: hidden;">
      <div *ngIf="plan.durationMonths === 12" style="position: absolute; top: 10px; right: -30px; background: var(--primary); color: white; padding: 5px 40px; transform: rotate(45deg); font-size: 0.75rem; font-weight: bold;">
        BEST VALUE
      </div>
      
      <i class="fas fa-gem" style="font-size: 2.5rem; color: var(--primary); margin-top: 1rem;"></i>
      <h3 style="margin: 0; font-size: 1.5rem;">{{ plan.planName }}</h3>
      <div style="font-size: 2.5rem; font-weight: 700; color: var(--text-main);">
        ${{ plan.price }}<span style="font-size: 1rem; color: var(--text-muted); font-weight: 400;">/{{ plan.durationMonths }}mo</span>
      </div>
      
      <ul style="list-style: none; padding: 0; text-align: left; color: var(--text-muted); font-size: 0.9rem; flex-grow: 1;">
        <li style="margin-bottom: 0.75rem;"><i class="fas fa-check" style="color: var(--secondary); margin-right: 0.5rem;"></i> Full Gym Access</li>
        <li style="margin-bottom: 0.75rem;"><i class="fas fa-check" style="color: var(--secondary); margin-right: 0.5rem;"></i> Group Fitness Classes</li>
        <li style="margin-bottom: 0.75rem;"><i class="fas fa-check" style="color: var(--secondary); margin-right: 0.5rem;"></i> Free WiFi & Shower</li>
        <li *ngIf="plan.price > 50" style="margin-bottom: 0.75rem;"><i class="fas fa-check" style="color: var(--secondary); margin-right: 0.5rem;"></i> Personal Training Sessions</li>
      </ul>

      <button (click)="selectPlan(plan)" class="btn-primary" style="margin-top: 1rem;">Select Plan</button>
    </div>

    <div *ngIf="plans.length === 0" class="glass-panel empty-state">
      <i class="fas fa-clipboard-list"></i>
      <p>No membership plans available</p>
    </div>
  </div>
</div>
