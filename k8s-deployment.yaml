apiVersion: apps/v1
kind: Deployment
metadata:
  name: gym-api-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gym-api
  template:
    metadata:
      labels:
        app: gym-api
    spec:
      containers:
      - name: gym-api
        image: yourdockerhub/gym-management-api:latest
        ports:
        - containerPort: 8080
        env:
        - name: ConnectionStrings__DefaultConnection
          value: "Host=postgres-service;Port=5432;Database=gym_db;Username=postgres;Password=postgres"
---
apiVersion: v1
kind: Service
metadata:
  name: gym-api-service
spec:
  type: LoadBalancer
  selector:
    app: gym-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
